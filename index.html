<!DOCTYPE html>
    <head>
        <meta charset="UTF-8">
        <title>Kathleen's Website</title>
        <link rel="stylesheet" href="mywebsitenew.css">
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    </head>
    <body>
          <div class="hero-section">

            <!-- base image -->
          <img src="room_base.jpg" class="room base">

            <!-- glow overlays -->
              <img src="contactbuttonfix.png" class="room glow contact-glow">
              <img src="portfoliobuttonfix.png" class="room glow portfolio-glow">
              <img src="resumebuttonfix.png" class="room glow resume-glow">
              <img src="instabuttonfix.png" class="room glow instagram-glow">
              <img src="itchiobuttonfix.png" class="room glow itch-glow">
              <img src="meteorbuttonfix.png" class="room glow meteor-glow">
              <img src="sketchbookbuttonfix.png" class="room glow sketchbook-glow">

            <!-- hotspots -->
            <a href="myportfolio/index.html" class="hotspot portfolio"></a>
            <a href="contact/index.html" class="hotspot contact"></a>
            <a href="resume.html" class="hotspot resume"></a>
            <a href="https://www.instagram.com/katwiththeblackcat/" target="_blank" class="hotspot instagram"></a>
            <a href="https://kyahsurin.itch.io/" target="_blank" class="hotspot itch"></a>
            <a href="https://ajwm8103.itch.io/meteor-dome" class="hotspot meteor"></a>
            <a href="mysketchbook/index.html" class="hotspot sketchbook"></a>
          </div>
          

          <div class="dialogue-box">

            <!-- character portrait -->
            <div class="portrait">
              <img src="profilepic.png" alt="Character">
            </div>

            <!-- text area -->
            <div class="dialogue-text">
              <span class="name">KATHLEEN ARAWIRAN</span>
              <p id="dialogue-line"></p>
              <span class="arrow">▶</span>
            </div>

          </div>



<script>
  document.addEventListener("DOMContentLoaded", () => {

  // ALL glow elements
  const glows = {
    portfolio: document.querySelector(".portfolio-glow"),
    contact: document.querySelector(".contact-glow"),
    resume: document.querySelector(".resume-glow"),
    instagram: document.querySelector(".instagram-glow"),
    itch: document.querySelector(".itch-glow"),
    meteor: document.querySelector(".meteor-glow"),
    sketchbook: document.querySelector(".sketchbook-glow")
  };

  // ALL hotspots
  const hotspots = {
    portfolio: document.querySelector(".portfolio"),
    contact: document.querySelector(".contact"),
    resume: document.querySelector(".resume"),
    instagram: document.querySelector(".instagram"),
    itch: document.querySelector(".itch"),
    meteor: document.querySelector(".meteor"),
    sketchbook: document.querySelector(".sketchbook")
  };

  function resetGlow() {
    Object.values(glows).forEach(glow => {
      if (glow) glow.style.opacity = "0";
    });
  }

  // attach events safely
  Object.keys(hotspots).forEach(key => {
    const hotspot = hotspots[key];
    const glow = glows[key];

    if (hotspot && glow) {
      hotspot.addEventListener("mouseenter", () => {
        resetGlow();
        glow.style.opacity = "1";
      });

      hotspot.addEventListener("mouseleave", resetGlow);
    }
  });

});

const dialogueLines = [
  "Hi... I'm Kathleen.",
  "I'm a student illustrator exploring interactive storytelling.",
  "This room is part of my portfolio.",
  "Click around to explore my work."
];

let dialogueIndex = 0;
let charIndex = 0;
let typing = false;

const dialogueEl = document.getElementById("dialogue-line");
const box = document.querySelector(".dialogue-box");

function typeLine() {
  if (charIndex < dialogueLines[dialogueIndex].length) {
    typing = true;
    dialogueEl.textContent += dialogueLines[dialogueIndex].charAt(charIndex);
    charIndex++;
    setTimeout(typeLine, 25);
  } else {
    typing = false;
  }
}

function showLine() {
  dialogueEl.textContent = "";
  charIndex = 0;
  typeLine();
}

box.addEventListener("click", () => {
  if (typing) {
    dialogueEl.textContent = dialogueLines[dialogueIndex];
    typing = false;
    return;
  }

  dialogueIndex++;

  if (dialogueIndex < dialogueLines.length) {
    showLine();
  }
});

showLine();

</script>
         
    </body>
</html>
